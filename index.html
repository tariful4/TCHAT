<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TARIFUL 2.0 - Private Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Poppins', sans-serif; }
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Auth Pages */
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #000 0%, #1a0c08 100%); position: fixed; width: 100%; z-index: 2000; }
        .auth-card { background: rgba(28,20,16,0.95); backdrop-filter: blur(10px); padding: 40px 30px; border-radius: 40px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(140,68,44,0.3); }
        .app-logo { font-size: 28px; margin-bottom: 30px; color: #fff; font-weight: bold; background: linear-gradient(135deg, #fff, #8c442c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input { width: 100%; padding: 18px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #3d2b24; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        .auth-card button { width: 100%; padding: 18px; background: linear-gradient(135deg, #8c442c, #5a2c1c); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .toggle-txt { margin-top: 20px; color: #f5d020; cursor: pointer; }

        /* Main App Interface */
        #app-interface { height: 100vh; width: 100%; display: flex; flex-direction: column; }
        #users-page, #inbox-page { height: 100%; width: 100%; display: flex; flex-direction: column; position: absolute; top: 0; left: 0; background: #000; }

        /* Header */
        .header, .chat-header { padding: 10px 15px; background: #0a0a0a; border-bottom: 1px solid rgba(140,68,44,0.3); flex-shrink: 0; }
        .header-top, .chat-user-info { display: flex; align-items: center; justify-content: space-between; }
        .top-avatar, .chat-user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #8c442c; object-fit: cover; }

        /* User List */
        .conversations { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .chat-item { display: flex; align-items: center; padding: 12px; cursor: pointer; border-radius: 15px; margin-bottom: 5px; transition: 0.3s; }
        .chat-item:hover { background: rgba(140,68,44,0.2); }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; object-fit: cover; }

        /* Inbox/Chat Box - Fixing Screen Issue */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; padding-bottom: 20px; }
        
        .message-wrapper { display: flex; width: 100%; margin-bottom: 4px; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }
        
        .message-bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .message-bubble.sent { background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .message-bubble.received { background: #262626; color: white; border-bottom-left-radius: 4px; }
        
        .message-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
        .message-avatar { width: 28px; height: 28px; border-radius: 50%; margin-right: 8px; align-self: flex-end; }

        /* Footer */
        .chat-footer { padding: 10px; background: #0a0a0a; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; flex-shrink: 0; }
        #messageInput { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        #sendBtn { background: #0084ff; border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; flex-shrink: 0; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 25px; width: 90%; max-width: 350px; text-align: center; }
        
        /* Helpers */
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div id="login-form" class="auth-card">
            <h1 class="app-logo">✨ TARIFUL 2.0 ✨</h1>
            <input type="text" id="loginEmailPhone" placeholder="📧 Email or Phone">
            <input type="password" id="loginPass" placeholder="🔒 Password">
            <button id="loginBtn">Login</button>
            <p class="toggle-txt" onclick="toggleAuth(true)">Create Account</p>
        </div>

        <div id="reg-form" class="auth-card" style="display:none;">
            <h1 class="app-logo">✨ Register ✨</h1>
            <input type="text" id="regEmailPhone" placeholder="📧 Email or Phone">
            <input type="password" id="regPass" placeholder="🔒 Password">
            <input type="text" id="regSecurity" placeholder="🔐 PIN Code">
            <button id="regBtn">Register</button>
            <p class="toggle-txt" onclick="toggleAuth(false)">Back to Login</p>
        </div>
    </div>

    <div id="app-interface" class="hidden">
        <div id="users-page">
            <div class="header">
                <div class="header-top">
                    <img id="myPic" class="top-avatar" src="" onclick="openSettings()">
                    <h2 style="flex:1; margin-left:15px;">Chats</h2>
                    <i class="fas fa-sign-out-alt" onclick="logout()" style="color:#8c442c; cursor:pointer;"></i>
                </div>
            </div>
            <div id="users-list" class="conversations"></div>
        </div>

        <div id="inbox-page" class="hidden">
            <div class="chat-header">
                <div class="chat-user-info">
                    <i class="fas fa-arrow-left" onclick="closeInbox()" style="cursor:pointer; font-size: 20px; color: #0084ff; padding-right: 15px;"></i>
                    <img id="pPic" class="chat-user-avatar" src="">
                    <div style="flex:1; margin-left:10px;">
                        <h4 id="pName" style="font-size: 16px;">Name</h4>
                        <small style="color:#4caf50;">Online</small>
                    </div>
                </div>
            </div>
            <div id="chat-box"></div>
            <div class="chat-footer">
                <input type="text" id="messageInput" placeholder="Write a message...">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD62pLbwBDSyszTVuN4pi83SIBxFMjjfqQ",
            authDomain: "tariful-4f6c2.firebaseapp.com",
            databaseURL: "https://tariful-4f6c2-default-rtdb.firebaseio.com",
            projectId: "tariful-4f6c2",
            storageBucket: "tariful-4f6c2.firebasestorage.app",
            messagingSenderId: "882412147422",
            appId: "1:882412147422:web:3100db9391ccd0bdc4684f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let currentChatId = null;
        let messageListener = null;

        window.toggleAuth = (showReg) => {
            document.getElementById('login-form').style.display = showReg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = showReg ? 'block' : 'none';
        };

        document.getElementById('regBtn').onclick = async () => {
            const emailPhone = document.getElementById('regEmailPhone').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const security = document.getElementById('regSecurity').value.trim();
            if(!emailPhone || !pass) return alert("Fill all fields");

            const dbId = 'user_' + Date.now();
            const userData = { id: dbId, emailPhone, username: emailPhone.split('@')[0], password: pass, profilePic: "https://cdn-icons-png.flaticon.com/512/149/149071.png" };
            await set(ref(db, 'users/' + dbId), userData);
            loginSuccess(userData);
        };

        document.getElementById('loginBtn').onclick = async () => {
            const emailPhone = document.getElementById('loginEmailPhone').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const snap = await get(ref(db, 'users'));
            let found = false;
            snap.forEach(c => {
                const u = c.val();
                if(u.emailPhone === emailPhone && u.password === pass) { found = u; }
            });
            if(found) loginSuccess(found); else alert("Wrong Info!");
        };

        function loginSuccess(user) {
            currentUser = user;
            localStorage.setItem('user', JSON.stringify(user));
            startApp();
        }

        function startApp() {
            if(!currentUser) return;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-interface').classList.remove('hidden');
            document.getElementById('myPic').src = currentUser.profilePic;
            loadUsers();
        }

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const user = c.val();
                    if(user.id !== currentUser.id) {
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        div.innerHTML = `<img src="${user.profilePic}"><div><h4>${user.username}</h4><small>Online</small></div>`;
                        div.onclick = () => openInbox(user);
                        list.appendChild(div);
                    }
                });
            });
        }

        window.openInbox = (user) => {
            document.getElementById('users-page').classList.add('hidden');
            document.getElementById('inbox-page').classList.remove('hidden');
            document.getElementById('pName').innerText = user.username;
            document.getElementById('pPic').src = user.profilePic;

            const ids = [currentUser.id, user.id].sort();
            currentChatId = ids[0] + '_' + ids[1];

            const chatBox = document.getElementById('chat-box');
            if(messageListener) messageListener();

            messageListener = onValue(ref(db, 'chats/' + currentChatId), (snap) => {
                chatBox.innerHTML = "";
                snap.forEach(c => {
                    const msg = c.val();
                    const isSent = msg.sender === currentUser.id;
                    const div = document.createElement('div');
                    div.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
                    div.innerHTML = `
                        ${!isSent ? `<img src="${user.profilePic}" class="message-avatar">` : ''}
                        <div class="message-bubble ${isSent ? 'sent' : 'received'}">
                            ${msg.text}
                            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                    `;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        };

        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text || !currentChatId) return;
            await push(ref(db, 'chats/' + currentChatId), {
                sender: currentUser.id,
                text: text,
                timestamp: Date.now()
            });
            input.value = "";
        };

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        window.closeInbox = () => {
            document.getElementById('inbox-page').classList.add('hidden');
            document.getElementById('users-page').classList.remove('hidden');
            if(messageListener) messageListener();
        };

        window.logout = () => { localStorage.clear(); location.reload(); };

        if(currentUser) startApp();
    </script>
</body>
</html>

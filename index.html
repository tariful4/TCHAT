<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="auth-container" class="auth-card">
        <h1 class="logo">messenger</h1>
        <div class="auth-inputs">
            <input type="text" id="userVal" placeholder="Email or phone number">
            <input type="password" id="userPass" placeholder="Password">
        </div>
        <button id="authBtn">Log In</button>
        <p class="auth-footer">Meta</p>
    </div>

    <div id="messenger-app" style="display:none;">
        
        <div id="chat-list-page">
            <div class="app-header">
                <div class="header-left">
                    <img id="myPic" class="top-avatar">
                    <h2>Chats</h2>
                </div>
                <div class="header-icons">
                    <i class="fas fa-camera"></i>
                    <i class="fas fa-sign-out-alt" id="logoutBtn"></i>
                </div>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search">
            </div>

            <div id="active-users-bar" class="story-section"></div>
            <div id="users-list" class="chat-list-section"></div>
        </div>

        <div id="inbox-page" style="display:none;">
            <div class="inbox-header">
                <i class="fas fa-arrow-left" id="backBtn"></i>
                <img id="partnerPic" class="avatar-sm">
                <div class="partner-meta">
                    <b id="partnerName">Name</b>
                    <span>Active now</span>
                </div>
                <div class="inbox-icons">
                    <i class="fas fa-phone"></i>
                    <i class="fas fa-video"></i>
                    <i class="fas fa-info-circle"></i>
                </div>
            </div>

            <div id="chat-box"></div>

            <div class="inbox-footer">
                <i class="fas fa-plus-circle"></i>
                <div class="input-wrap">
                    <input type="text" id="messageInput" placeholder="Message">
                    <i class="far fa-smile"></i>
                </div>
                <i class="fas fa-thumbs-up" id="sendBtn"></i>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="auth-container" class="auth-card">
        <div id="login-form">
            <h1 class="logo">messenger</h1>
            <div class="input-group">
                <input type="text" id="loginUser" placeholder="Username (Email or Phone)">
                <input type="password" id="loginPass" placeholder="Password">
            </div>
            <button id="loginBtn">Log In</button>
            <p class="toggle-link">Don't have an account? <span id="toReg">Register here</span></p>
            <p class="meta-txt">Meta</p>
        </div>

        <div id="reg-form" style="display:none;">
            <h1 class="logo">messenger</h1>
            <div class="input-group">
                <input type="text" id="regUser" placeholder="Email or Phone number">
                <input type="password" id="regPass" placeholder="Password">
            </div>
            <button id="registerBtn">Create Account</button>
            <p class="toggle-link">Already have an account? <span id="toLogin">Log In</span></p>
        </div>
    </div>

    <div id="messenger-app" style="display:none;">
        
        <div id="chat-list-page">
            <div class="app-header">
                <div class="h-left">
                    <img id="myPic" class="top-avatar">
                    <h2>Chats</h2>
                </div>
                <div class="h-right">
                    <i class="fas fa-camera"></i>
                    <i class="fas fa-edit" id="logoutBtn"></i>
                </div>
            </div>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Ask Meta AI or Search">
            </div>

            <div id="active-bar" class="active-stories"></div>

            <div id="users-list" class="main-chats"></div>

            <div class="bottom-nav">
                <div class="nav-item active"><i class="fas fa-comment"></i><span>Chats</span></div>
                <div class="nav-item"><i class="fas fa-users"></i><span>Stories</span></div>
                <div class="nav-item"><i class="fas fa-bell"></i><span>Notifications</span></div>
                <div class="nav-item"><i class="fas fa-bars"></i><span>Menu</span></div>
            </div>
        </div>

        <div id="inbox-page" style="display:none;">
            <div class="inbox-header">
                <i class="fas fa-arrow-left" id="backBtn"></i>
                <img id="partnerPic" class="avatar-sm">
                <div class="p-info">
                    <b id="partnerName">Name</b>
                    <span>Active 4 hours ago</span>
                </div>
                <div class="inbox-icons">
                    <i class="fas fa-phone"></i>
                    <i class="fas fa-video"></i>
                    <i class="fas fa-circle-info"></i>
                </div>
            </div>

            <div id="chat-box"></div>

            <div class="inbox-footer">
                <i class="fas fa-circle-plus"></i>
                <i class="fas fa-camera"></i>
                <i class="fas fa-image"></i>
                <i class="fas fa-microphone"></i>
                <div class="msg-input-box">
                    <input type="text" id="messageInput" placeholder="Message">
                    <i class="far fa-smile"></i>
                </div>
                <i class="fas fa-thumbs-up" id="sendBtn"></i>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="auth-container" class="auth-card">
        <div id="login-form">
            <h1 class="app-logo">Chatting App</h1>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button id="loginBtn">Log In</button>
            <p class="toggle-txt">Don't have an account? <span id="showReg">Register</span></p>
        </div>

        <div id="reg-form" style="display:none;">
            <h1 class="app-logo">Create Account</h1>
            <input type="text" id="regId" placeholder="Email or phone number">
            <input type="password" id="regPass" placeholder="Password">
            <button id="regBtn">Register</button>
            <p class="toggle-txt">Already have an account? <span id="showLogin">Log In</span></p>
        </div>
    </div>

    <div id="app-interface" style="display:none;">
        <div id="chat-list-page">
            <div class="header">
                <div class="header-top">
                    <img id="myPic" class="top-avatar">
                    <h2>Chats</h2>
                    <div class="header-btns">
                        <i class="fas fa-pen" id="editProfileBtn"></i>
                        <i class="fas fa-sign-out-alt" id="logoutBtn" style="margin-left: 15px;"></i>
                    </div>
                </div>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search">
                </div>
            </div>
            
            <div id="users-list" class="conversations"></div>

            <div class="bottom-nav">
                <div class="nav-item active"><i class="fas fa-comment"></i><span>Chats</span></div>
                <div class="nav-item">
                    <i class="fas fa-bell"></i>
                    <span id="notif-dot" class="red-dot" style="display:none;"></span>
                    <span>Notifications</span>
                </div>
            </div>
        </div>

        <div id="inbox-page" style="display:none;">
            <div class="inbox-header">
                <i class="fas fa-arrow-left" id="backBtn"></i>
                <img id="pPic" class="avatar-sm">
                <div class="p-info"><b id="pName">Name</b><span>Active now</span></div>
            </div>
            <div id="chat-box"></div>
            <div class="inbox-footer">
                <div class="input-wrap"><input type="text" id="messageInput" placeholder="Message"></div>
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Edit Profile</h3>
            <input type="text" id="editName" placeholder="New Username">
            <input type="text" id="editPic" placeholder="Profile Image URL">
            <button id="saveProfileBtn">Save</button>
            <button onclick="document.getElementById('edit-modal').style.display='none'">Cancel</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

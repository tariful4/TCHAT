<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARIFUL 2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS অংশ - আপনার ফটো অনুযায়ী ডিজাইন */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #000; color: white; height: 100vh; overflow: hidden; }

        /* ১. লগইন পেজ ডিজাইন (Photo 81) */
        #auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; background: #000; }
        .auth-card { background: #1c1410; padding: 40px 30px; border-radius: 40px; width: 90%; max-width: 380px; text-align: center; }
        .app-logo { font-size: 28px; margin-bottom: 30px; color: #fff; font-weight: bold; }
        .auth-card input { width: 100%; padding: 18px; margin-bottom: 15px; background: transparent; border: 1px solid #3d2b24; border-radius: 15px; color: white; outline: none; font-size: 16px; }
        .auth-card button { width: 100%; padding: 18px; background: #8c442c; color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .toggle-txt { margin-top: 20px; color: #f5d020; cursor: pointer; font-weight: 500; }
        .forgot-pw { color: #8c442c; font-size: 14px; margin-top: 15px; display: block; text-decoration: none; }

        /* ২. চ্যাট লিস্ট পেজ (Photo 82) */
        .header { padding: 15px; background: #000; border-bottom: 1px solid #111; position: sticky; top: 0; }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .top-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .conversations { height: calc(100vh - 130px); overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 15px; cursor: pointer; }
        .chat-item img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; border: 1px solid #222; }
        .chat-info { flex: 1; }
        .chat-info h4 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .chat-info p { font-size: 14px; color: #aaa; }

        /* ৩. ইনবক্স পেজ (Photo 84) */
        #chat-box { height: calc(100vh - 135px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #000; }
        .msg { max-width: 75%; padding: 10px 16px; border-radius: 20px; margin-bottom: 5px; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: #0084ff; color: white; }
        .received { align-self: flex-start; background: #333; color: white; }
        .msg-img { width: 28px; height: 28px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }

        /* চ্যাট ইনপুট এরিয়া */
        .chat-footer { display: flex; align-items: center; padding: 10px; background: #000; }
        .footer-icons { display: flex; gap: 18px; margin-right: 12px; color: #0084ff; font-size: 20px; }
        #messageInput { flex: 1; background: #1a1a1a; border: none; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        #sendBtn { background: transparent; border: none; color: #0084ff; font-size: 22px; margin-left: 10px; cursor: pointer; }

        /* ৪. সেটিং/এডিট প্রোফাইল মোডাল */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #333; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 10px; }
        .modal-btn { padding: 12px 20px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div id="login-form" class="auth-card">
            <h1 class="app-logo">TARIFUL 2.0</h1>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button id="loginBtn">Login</button>
            <p class="toggle-txt" onclick="toggleAuth(true)">New User? Register</p>
            <a href="#" class="forgot-pw">Forgot Password?</a>
        </div>

        <div id="reg-form" class="auth-card" style="display:none;">
            <h1 class="app-logo">Register</h1>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="password" id="regPass" placeholder="Set Password">
            <button id="regBtn">Register</button>
            <p class="toggle-txt" onclick="toggleAuth(false)">Have account? Log In</p>
        </div>
    </div>

    <div id="app-interface" style="display:none;">
        <div id="chat-list-page">
            <div class="header">
                <div class="header-top">
                    <img id="myPic" class="top-avatar" src="" onclick="openSettings()">
                    <h2 style="flex:1; margin-left:15px; font-size:24px;">Chats</h2>
                    <i class="fas fa-camera" style="font-size: 20px;"></i>
                </div>
                <div style="background:#1a1a1a; padding:10px; border-radius:20px; margin-top:15px; display:flex; align-items:center;">
                    <i class="fas fa-search" style="color:#555; margin-right:10px;"></i>
                    <input type="text" placeholder="Search" style="background:transparent; border:none; color:white; outline:none; width:100%;">
                </div>
            </div>
            <div id="users-list" class="conversations"></div>
        </div>

        <div id="inbox-page" style="display:none;">
            <div class="header" style="display:flex; align-items:center;">
                <i class="fas fa-arrow-left" onclick="closeInbox()" style="color:#0084ff; font-size:20px; padding:5px;"></i>
                <img id="pPic" class="top-avatar" style="margin: 0 12px; width:35px; height:35px;">
                <div style="flex:1">
                    <b id="pName" style="font-size:16px;">Name</b><br>
                    <span style="font-size:11px; color: #888;">Active 29m ago</span>
                </div>
                <div style="color:#0084ff; font-size:18px; display:flex; gap:20px;">
                    <i class="fas fa-phone"></i>
                    <i class="fas fa-video"></i>
                    <i class="fas fa-info-circle"></i>
                </div>
            </div>
            <div id="chat-box"></div>
            <div class="chat-footer">
                <div class="footer-icons">
                    <i class="fas fa-plus-circle"></i>
                    <i class="fas fa-camera"></i>
                    <i class="fas fa-image"></i>
                    <i class="fas fa-microphone"></i>
                </div>
                <input type="text" id="messageInput" placeholder="Aa">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">Edit Profile</h3>
            <input type="text" id="editName" placeholder="New Name">
            <input type="text" id="editPic" placeholder="New Profile Image URL">
            <button class="modal-btn" style="background:#0084ff; color:white;" id="saveProfileBtn">Save Changes</button>
            <button class="modal-btn" style="background:#333; color:white;" onclick="closeSettings()">Cancel</button>
            <button class="modal-btn" style="background:#8c442c; color:white; margin-top:20px;" id="logoutBtn">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD62pLbwBDSyszTVuN4pi83SIBxFMjjfqQ",
            authDomain: "tariful-4f6c2.firebaseapp.com",
            databaseURL: "https://tariful-4f6c2-default-rtdb.firebaseio.com",
            projectId: "tariful-4f6c2",
            storageBucket: "tariful-4f6c2.firebasestorage.app",
            messagingSenderId: "882412147422",
            appId: "1:882412147422:web:3100db9391ccd0bdc4684f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = null, currentChatId = null;

        window.toggleAuth = (isReg) => {
            document.getElementById('login-form').style.display = isReg ? 'none' : 'flex';
            document.getElementById('reg-form').style.display = isReg ? 'flex' : 'none';
        }

        document.getElementById('regBtn').onclick = async () => {
            const name = document.getElementById('regName').value;
            const pass = document.getElementById('regPass').value;
            if(!name || !pass) return alert("Fill all fields!");
            const dbId = name.toLowerCase().replace(/\s/g, "") + Math.floor(Math.random() * 1000);
            await set(ref(db, 'users/' + dbId), { id: dbId, username: name, password: pass, profilePic: "https://cdn-icons-png.flaticon.com/512/149/149071.png" });
            alert("Registered! Now Login."); toggleAuth(false);
        };

        document.getElementById('loginBtn').onclick = async () => {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const snap = await get(ref(db, 'users/'));
            let found = false;
            snap.forEach(c => {
                const u = c.val();
                if(u.username === user && u.password === pass) { currentUser = u; found = true; }
            });
            if(found) startApp(); else alert("Invalid username or password!");
        };

        function startApp() {
            localStorage.setItem("user", JSON.stringify(currentUser));
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-interface').style.display = 'block';
            document.getElementById('myPic').src = currentUser.profilePic;
            loadUsers();
        }

        function loadUsers() {
            onValue(ref(db, 'users/'), (snap) => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    if(u.id !== currentUser.id) {
                        const item = document.createElement('div');
                        item.className = 'chat-item';
                        item.innerHTML = `<img src="${u.profilePic}"><div class="chat-info"><h4>${u.username}</h4><p>Active 10m ago</p></div>`;
                        item.onclick = () => openInbox(u.id, u.username, u.profilePic);
                        list.appendChild(item);
                    }
                });
            });
        }

        window.openInbox = (id, name, pic) => {
            document.getElementById('chat-list-page').style.display = 'none';
            document.getElementById('inbox-page').style.display = 'block';
            document.getElementById('pName').innerText = name;
            document.getElementById('pPic').src = pic;
            currentChatId = [currentUser.id, id].sort().join("_");
            onValue(ref(db, 'chats/' + currentChatId), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const isSent = d.s === currentUser.id;
                    box.innerHTML += `
                        <div style="display:flex; align-items:flex-end; margin-bottom:8px; ${isSent ? 'justify-content:flex-end' : ''}">
                            ${!isSent ? `<img src="${pic}" class="msg-img">` : ''}
                            <div class="msg ${isSent ? 'sent' : 'received'}">${d.t}</div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        document.getElementById('sendBtn').onclick = () => {
            const t = document.getElementById('messageInput').value;
            if(!t) return;
            push(ref(db, 'chats/' + currentChatId), { s: currentUser.id, t: t });
            document.getElementById('messageInput').value = "";
        };

        window.closeInbox = () => {
            document.getElementById('inbox-page').style.display = 'none';
            document.getElementById('chat-list-page').style.display = 'block';
        };

        // সেটিং ফাংশনালিটি
        window.openSettings = () => {
            document.getElementById('settings-modal').style.display = 'flex';
            document.getElementById('editName').value = currentUser.username;
            document.getElementById('editPic').value = currentUser.profilePic;
        };

        window.closeSettings = () => { document.getElementById('settings-modal').style.display = 'none'; };

        document.getElementById('saveProfileBtn').onclick = async () => {
            const newName = document.getElementById('editName').value;
            const newPic = document.getElementById('editPic').value;
            await update(ref(db, 'users/' + currentUser.id), { username: newName, profilePic: newPic });
            currentUser.username = newName;
            currentUser.profilePic = newPic;
            localStorage.setItem("user", JSON.stringify(currentUser));
            alert("Profile Updated!");
            location.reload();
        };

        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); location.reload(); };

        const savedUser = localStorage.getItem("user");
        if(savedUser) { currentUser = JSON.parse(savedUser); startApp(); }
    </script>
</body>
</html>

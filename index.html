<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCHAT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Global Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
        body { background: #18191a; color: #e4e6eb; height: 100vh; width: 100vw; overflow: hidden; }

        /* Auth Pages */
        #auth-container { position: fixed; width: 100%; height: 100%; background: #18191a; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #242526; padding: 40px 20px; border-radius: 8px; width: 100%; height: 100%; max-width: 500px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .app-logo { font-size: 45px; margin-bottom: 20px; color: #8c442c; font-weight: bold; }
        .auth-card input { width: 90%; margin: 10px auto; padding: 18px; background: #3a3b3c; border: 1px solid #333; border-radius: 8px; color: white; font-size: 16px; outline: none; }
        .auth-card button { width: 90%; margin: 15px auto; padding: 15px; background: #8c442c; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .toggle-txt { margin-top: 20px; color: #45bd62; cursor: pointer; font-weight: 600; }

        /* Main Layout */
        #app-interface { height: 100vh; width: 100%; display: none; flex-direction: column; }
        .header { height: 60px; padding: 0 15px; background: #242526; border-bottom: 1px solid #3e4042; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header h2 { font-size: 24px; color: #fff; font-weight: 700; }

        .page-content { flex: 1; overflow-y: auto; background: #18191a; }
        .hidden { display: none !important; }

        /* Create Post - FB Style */
        .create-post { background: #242526; padding: 15px; margin-bottom: 10px; border-bottom: 1px solid #3e4042; }
        .post-input-row { display: flex; gap: 12px; align-items: center; }
        .post-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #3a3b3c; }
        #postText { flex: 1; background: #3a3b3c; border: none; border-radius: 25px; padding: 12px 20px; color: white; outline: none; font-size: 16px; }
        .post-btn { width: 100%; background: #8c442c; color: white; border: none; padding: 12px; border-radius: 6px; margin-top: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Post Card - Bigger & Clearer */
        .post-card { background: #242526; margin-bottom: 10px; padding: 15px 0; width: 100%; }
        .post-header { display: flex; align-items: center; gap: 12px; padding: 0 15px 10px; }
        .post-user { font-weight: 600; font-size: 17px; color: #e4e6eb; }
        .post-time { font-size: 13px; color: #b0b3b8; }
        .post-content { font-size: 17px; line-height: 1.5; padding: 5px 15px 15px; color: #e4e6eb; word-wrap: break-word; }
        
        .post-stats { display: flex; justify-content: space-between; padding: 10px 15px; font-size: 14px; color: #b0b3b8; border-top: 1px solid #3e4042; }
        .post-actions { padding: 5px 10px; display: flex; justify-content: space-around; border-top: 1px solid #3e4042; }
        .post-actions span { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: 600; color: #b0b3b8; font-size: 15px; border-radius: 5px; }
        .post-actions span:active { background: #3a3b3c; }
        .post-actions span.liked { color: #8c442c; }
        .del-btn { margin-left: auto; color: #b0b3b8; font-size: 18px; }

        /* Comments */
        .comment-section { background: #242526; padding: 10px 15px; display: none; border-top: 1px solid #3e4042; }
        .comment-item { background: #3a3b3c; padding: 10px 15px; border-radius: 18px; margin-bottom: 8px; width: fit-content; max-width: 90%; }
        .comment-user { font-weight: 700; font-size: 14px; color: #fff; display: block; }
        .comment-input-row { display: flex; gap: 10px; align-items: center; padding-top: 10px; }
        .comment-input-row input { flex: 1; background: #3a3b3c; border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }

        /* Profile */
        .profile-container { text-align: center; padding: 40px 20px; background: #242526; }
        .big-prof-pic { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #8c442c; object-fit: cover; }
        .cam-icon { position: absolute; bottom: 10px; right: 10px; background: #3a3b3c; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #242526; }

        /* Floating Chat Button */
        #chat-toggle-btn { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #8c442c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 500; }

        /* Chat UI - Full Screen */
        #users-page, #inbox-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #18191a; z-index: 1000; display: flex; flex-direction: column; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #3e4042; }
        .chat-item img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #18191a; }
        .message-bubble { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .message-bubble.sent { background: #8c442c; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-bubble.received { background: #3a3b3c; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .chat-footer { padding: 15px; background: #242526; display: flex; gap: 12px; align-items: center; }
        #messageInput { flex: 1; background: #3a3b3c; border: none; padding: 15px 20px; border-radius: 30px; color: white; outline: none; font-size: 16px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div id="login-form" class="auth-card">
            <h1 class="app-logo">TCHAT</h1>
            <input type="text" id="loginEmailPhone" placeholder="Email or Phone">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="login()">Log In</button>
            <p class="toggle-txt" onclick="toggleAuth(true)">Create new account</p>
        </div>
        <div id="reg-form" class="auth-card" style="display:none;">
            <h1 class="app-logo">Sign Up</h1>
            <input type="text" id="regEmailPhone" placeholder="Mobile number or email">
            <input type="password" id="regPass" placeholder="New password">
            <button onclick="register()">Sign Up</button>
            <p class="toggle-txt" onclick="toggleAuth(false)">Already have an account?</p>
        </div>
    </div>

    <div id="app-interface">
        <div class="header">
            <img id="myPic" class="post-avatar" src="" onclick="showMyProfile()" style="cursor:pointer;">
            <h2 onclick="showNewsfeed()">TCHAT</h2>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="color:#b0b3b8; font-size: 22px;"></i>
        </div>

        <div id="newsfeed-page" class="page-content">
            <div class="create-post">
                <div class="post-input-row">
                    <img id="postMyPic" class="post-avatar" src="">
                    <input type="text" id="postText" placeholder="What's on your mind?">
                </div>
                <button class="post-btn" onclick="createPost()">Post</button>
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="profile-page" class="page-content hidden">
            <div class="header">
                <i class="fas fa-arrow-left" onclick="showNewsfeed()" style="font-size: 20px;"></i>
                <h2 style="margin-left: 15px; flex: 1;">Profile</h2>
            </div>
            <div class="profile-container">
                <div class="profile-pic-wrapper" style="position: relative; display: inline-block;">
                    <img id="profPic" class="big-prof-pic" src="">
                    <label id="cam-label" for="fileInput" class="cam-icon">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="uploadPhoto(event)">
                </div>
                <div style="margin-top:20px;">
                    <h3 id="profName" style="font-size: 28px; font-weight: bold;">Name</h3>
                    <p id="edit-name-btn" onclick="changeName()" style="color: #8c442c; cursor:pointer; margin-top:5px;">Edit Name</p>
                </div>
                <button id="msg-btn-prof" style="display:none; margin: 20px auto; padding: 12px 40px; background: #3a3b3c; color: white; border-radius: 8px; border: none; font-weight: bold; width: 80%;">Message</button>
            </div>
            <div id="user-posts-container"></div>
        </div>

        <div id="chat-toggle-btn" onclick="openChatList()">
            <i class="fas fa-comment-alt"></i>
        </div>
    </div>

    <div id="users-page" class="hidden">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeChatList()"></i>
            <h2 style="margin-left: 15px; flex: 1;">Chats</h2>
        </div>
        <div id="users-list"></div>
    </div>

    <div id="inbox-page" class="hidden">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeInbox()"></i>
            <img id="pPic" class="post-avatar" style="margin-left:15px;" src="">
            <h4 id="pName" style="margin-left:12px; flex:1; font-size: 18px;">Name</h4>
        </div>
        <div id="chat-box"></div>
        <div class="chat-footer">
            <input type="text" id="messageInput" placeholder="Aa" onkeydown="if(event.key==='Enter') sendMessage()">
            <i class="fas fa-paper-plane" onclick="sendMessage()" style="color:#8c442c; font-size:24px; cursor:pointer;"></i>
        </div>
    </div>

    <script type="module">
        // Firebase Logic (Same as your original functionality)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, update, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAT22X04lwGjaneGGW9sKzeO6hWVAA3n6g",
            authDomain: "tchat-a9707.firebaseapp.com",
            databaseURL: "https://tchat-a9707-default-rtdb.firebaseio.com",
            projectId: "tchat-a9707",
            storageBucket: "tchat-a9707.firebasestorage.app",
            messagingSenderId: "324756549796",
            appId: "1:324756549796:web:f557ebab16be9e5545f631"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let currentChatId = null;
        const defaultPic = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        // --- AUTH ---
        window.toggleAuth = (reg) => {
            document.getElementById('login-form').style.display = reg ? 'none' : 'flex';
            document.getElementById('reg-form').style.display = reg ? 'flex' : 'none';
        }

        window.register = async () => {
            const ep = document.getElementById('regEmailPhone').value.trim();
            const ps = document.getElementById('regPass').value.trim();
            if(!ep || !ps) return alert("Please fill details");
            const id = 'user_' + Date.now();
            const user = { id, emailPhone: ep, username: ep.split('@')[0], password: ps, profilePic: defaultPic };
            await set(ref(db, 'users/'+id), user);
            loginOk(user);
        }

        window.login = async () => {
            const ep = document.getElementById('loginEmailPhone').value.trim();
            const ps = document.getElementById('loginPass').value.trim();
            const snap = await get(ref(db, 'users'));
            let found = null;
            snap.forEach(c => { if(c.val().emailPhone === ep && c.val().password === ps) found = c.val(); });
            if(found) loginOk(found); else alert("Wrong credentials!");
        }

        function loginOk(user) {
            localStorage.setItem('user', JSON.stringify(user));
            location.reload();
        }

        window.logout = () => { localStorage.clear(); location.reload(); }

        // --- POSTS ---
        window.createPost = async () => {
            const txt = document.getElementById('postText').value.trim();
            if(!txt) return;
            await push(ref(db, 'posts'), {
                uid: currentUser.id,
                name: currentUser.username,
                pic: currentUser.profilePic || defaultPic,
                text: txt,
                timestamp: Date.now()
            });
            document.getElementById('postText').value = "";
        }

        function generatePostHTML(p) {
            const likeCount = p.likes ? Object.keys(p.likes).length : 0;
            const cmtCount = p.comments ? Object.keys(p.comments).length : 0;
            const isLiked = p.likes && p.likes[currentUser.id];

            return `
            <div class="post-card">
                <div class="post-header">
                    <img src="${p.pic || defaultPic}" class="post-avatar" onclick="visitProfile('${p.uid}')">
                    <div><div class="post-user" onclick="visitProfile('${p.uid}')">${p.name}</div><div class="post-time">${new Date(p.timestamp).toLocaleTimeString()}</div></div>
                    ${p.uid === currentUser.id ? `<i class="fas fa-ellipsis-h del-btn" onclick="deletePost('${p.id}')"></i>` : ''}
                </div>
                <div class="post-content">${p.text}</div>
                <div class="post-stats"><span>👍 ${likeCount}</span><span>${cmtCount} comments</span></div>
                <div class="post-actions">
                    <span class="${isLiked?'liked':''}" onclick="toggleLike('${p.id}')"><i class="far fa-thumbs-up"></i> Like</span>
                    <span onclick="showComments('${p.id}')"><i class="far fa-comment"></i> Comment</span>
                </div>
                <div class="comment-section" id="comments-${p.id}">
                    <div id="comment-list-${p.id}"></div>
                    <div class="comment-input-row">
                        <input type="text" id="cmt-inp-${p.id}" placeholder="Write a comment...">
                        <button onclick="addComment('${p.id}')" style="background:none; border:none; color:#8c442c;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>`;
        }

        window.toggleLike = async (pid) => {
            const postRef = ref(db, `posts/${pid}/likes/${currentUser.id}`);
            const snap = await get(postRef);
            if(snap.exists()) await remove(postRef); else await set(postRef, true);
        }

        window.showComments = (pid) => {
            const el = document.getElementById(`comments-${pid}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        window.addComment = async (pid) => {
            const inp = document.getElementById(`cmt-inp-${pid}`);
            if(!inp.value.trim()) return;
            await push(ref(db, `posts/${pid}/comments`), { uid: currentUser.id, name: currentUser.username, text: inp.value });
            inp.value = "";
        }

        window.deletePost = (pid) => { if(confirm("Delete post?")) remove(ref(db, 'posts/'+pid)); }

        // --- PROFILE & CHAT ---
        window.visitProfile = async (uid) => {
            const snap = await get(ref(db, 'users/'+uid));
            const u = snap.val();
            document.getElementById('newsfeed-page').classList.add('hidden');
            document.getElementById('profile-page').classList.remove('hidden');
            document.getElementById('profPic').src = u.profilePic || defaultPic;
            document.getElementById('profName').innerText = u.username;
            const isMe = uid === currentUser.id;
            document.getElementById('cam-label').style.display = isMe ? 'flex' : 'none';
            document.getElementById('edit-name-btn').style.display = isMe ? 'block' : 'none';
            const mBtn = document.getElementById('msg-btn-prof');
            if(!isMe) { mBtn.style.display = 'block'; mBtn.onclick = () => openInbox(u); } else mBtn.style.display = 'none';
        }

        window.openInbox = (user) => {
            document.getElementById('users-page').classList.add('hidden');
            document.getElementById('profile-page').classList.add('hidden');
            document.getElementById('inbox-page').classList.remove('hidden');
            document.getElementById('pName').innerText = user.username;
            document.getElementById('pPic').src = user.profilePic || defaultPic;
            const ids = [currentUser.id, user.id].sort();
            currentChatId = ids[0] + '_' + ids[1];
            onValue(ref(db, 'chats/'+currentChatId), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val(); const isSent = m.sender === currentUser.id;
                    box.innerHTML += `<div class="message-bubble ${isSent?'sent':'received'}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const inp = document.getElementById('messageInput');
            if(!inp.value.trim()) return;
            await push(ref(db, 'chats/'+currentChatId), { sender: currentUser.id, text: inp.value });
            inp.value = "";
        }

        // Initialize App
        if(currentUser) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-interface').style.display = 'flex';
            document.getElementById('myPic').src = currentUser.profilePic || defaultPic;
            document.getElementById('postMyPic').src = currentUser.profilePic || defaultPic;
            
            onValue(ref(db, 'posts'), (snap) => {
                const feed = document.getElementById('feed-container'); feed.innerHTML = "";
                let posts = []; snap.forEach(c => posts.push({id: c.key, ...c.val()}));
                posts.reverse().forEach(p => feed.innerHTML += generatePostHTML(p));
            });

            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('users-list'); list.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    if(u.id !== currentUser.id) {
                        list.innerHTML += `<div class="chat-item" onclick='openInbox(${JSON.stringify(u)})'>
                            <img src="${u.profilePic || defaultPic}">
                            <div><h4 style="font-size:18px;">${u.username}</h4><p style="color:#b0b3b8;">Say hi!</p></div>
                        </div>`;
                    }
                });
            });
        }

        // Global functions
        window.showNewsfeed = () => { document.getElementById('profile-page').classList.add('hidden'); document.getElementById('newsfeed-page').classList.remove('hidden'); }
        window.showMyProfile = () => visitProfile(currentUser.id);
        window.openChatList = () => document.getElementById('users-page').classList.remove('hidden');
        window.closeChatList = () => document.getElementById('users-page').classList.add('hidden');
        window.closeInbox = () => document.getElementById('inbox-page').classList.add('hidden');
    </script>
</body>
</html>
